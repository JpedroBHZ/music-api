# URL de conexão: altera "music_db" para o nome do banco de dados que você criou no HeidiSQL
spring.datasource.url=jdbc:mysql://localhost:3306/music_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
  
  # Credenciais do seu MySQL local (ajuste se o seu usuário ou senha forem diferentes)
spring.datasource.username=root
spring.datasource.password=admin123
  
  # Configurações do Hibernate / JPA
  # "update" faz o Spring criar ou atualizar as tabelas automaticamente no seu MySQL ao iniciar
spring.jpa.hibernate.ddl-auto=update
  # Exibe no console da IDE os comandos SQL que o Spring está executando por baixo dos panos
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false