name: Java CI with Maven

# Define que a esteira vai rodar sozinha toda vez que houver um Push ou Pull Request na branch main
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # O GitHub vai ligar uma máquina Linux limpa na nuvem deles

    services:
      # Como a sua API precisa de um banco para rodar os testes, o GitHub liga um Postgres temporário para você
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: music_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Passo 1: Baixa o seu código na máquina do GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Passo 2: Instala o Java 21 na máquina do GitHub
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Passo 3: Compila o projeto e roda todos os seus testes automatizados (JUnit)
      - name: Build and Run Tests with Maven
        run: mvn clean package
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/music_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: admin123